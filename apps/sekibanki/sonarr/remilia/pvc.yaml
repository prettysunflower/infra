apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: remilia-config
  namespace: sonarr
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-sonarr-media-remilia
spec:
  capacity:
    storage: 2T
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /var/mnt/yuyuko/media/
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-medias-remilia
  namespace: sonarr
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 2T
  volumeName: pv-sonarr-media-remilia
