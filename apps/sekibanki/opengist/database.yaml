# yaml-language-server: $schema=https://git.prettysunflower.moe/prettysunflower/himawari/raw/branch/main/cnpg-schemas/v1.28.0/io.cnpg.postgresql.v1.Cluster.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
spec:
  instances: 2

  imageCatalogRef:
    apiGroup: postgresql.cnpg.io
    kind: ClusterImageCatalog
    major: 18
    name: postgresql-standard-trixie

  storage:
    size: 5Gi
    storageClass: local-path

  bootstrap:
    initdb:
      import:
        type: microservice
        databases:
          - opengist
        source:
          externalCluster: sekibanki

  externalClusters:
    - name: sekibanki
      connectionParameters:
        host: 100.110.40.2
        user: opengist
        dbname: opengist
      password:
        name: opengist-secret
        key: DATABASE_PASSWORD
