apiVersion: v1
kind: Service
metadata:
  name: outline
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: outline
  ports:
    - protocol: TCP
      port: 80
      targetPort: http
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: valkey
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: valkey
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
