# yaml-language-server: $schema=https://git.prettysunflower.moe/prettysunflower/himawari/raw/branch/main/cnpg-schemas/v1.28.0/io.cnpg.postgresql.v1.Cluster.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: paperless
spec:
  instances: 2

  bootstrap:
    initdb:
      import:
        type: microservice
        databases:
          - paperless
        source:
          externalCluster: sekibanki-postgres

  imageCatalogRef:
    apiGroup: postgresql.cnpg.io
    kind: ClusterImageCatalog
    major: 18
    name: postgresql-standard-trixie

  storage:
    size: 5Gi
    storageClass: local-path

  externalClusters:
    - name: sekibanki-postgres
      connectionParameters:
        host: 100.110.40.2
        user: paperless
        dbname: paperless
      password:
        name: paperless-secrets
        key: PAPERLESS_DBPASS
