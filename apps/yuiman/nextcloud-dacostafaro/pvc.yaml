apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nextcloud-valkey-pvc
  namespace: nextcloud-dacostafaro
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path
