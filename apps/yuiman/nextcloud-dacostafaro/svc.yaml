apiVersion: v1
kind: Service
metadata:
  name: nextcloud
  namespace: nextcloud-dacostafaro
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nextcloud
  ports:
    - protocol: TCP
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: valkey
  namespace: nextcloud-dacostafaro
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: valkey
  ports:
    - protocol: TCP
      port: 6379
      targetPort: valkey
