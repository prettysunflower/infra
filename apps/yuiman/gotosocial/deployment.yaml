apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotosocial
  namespace: gotosocial
  labels:
    app.kubernetes.io/name: gotosocial
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gotosocial
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gotosocial
    spec:
      volumes:
        - name: gotosocial-data
          persistentVolumeClaim:
            claimName: gotosocial-pvc
        - name: gotosocial-wazero-cache
          persistentVolumeClaim:
            claimName: gotosocial-wazero-cache
      containers:
        - image: docker.io/superseriousbusiness/gotosocial:0.22.0-rc1
          imagePullPolicy: Always
          name: gotosocial
          ports:
            - containerPort: 8080
              protocol: TCP
              name: http
            - containerPort: 9464
              protocol: TCP
              name: metrics
          env:
            - name: GTS_DB_POSTGRES_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: postgres-app
                  key: uri
          envFrom:
            - configMapRef:
                name: gotosocial-config
            - secretRef:
                name: gotosocial-secrets
          volumeMounts:
            - name: gotosocial-data
              mountPath: /gotosocial/storage
            - name: gotosocial-wazero-cache
              mountPath: /gotosocial/.cache
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 2
            timeoutSeconds: 5
            failureThreshold: 30
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          resources:
            limits:
              cpu: 750m
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
