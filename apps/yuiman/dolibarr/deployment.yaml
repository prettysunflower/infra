apiVersion: apps/v1
kind: Deployment
metadata:
  name: dolibarr
  namespace: dolibarr
  labels:
    app.kubernetes.io/name: dolibarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dolibarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dolibarr
    spec:
      volumes:
        - name: dolibarr-data
          persistentVolumeClaim:
            claimName: dolibarr-pvc
      containers:
        - name: dolibarr
          image: dolibarr/dolibarr:develop
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: dolibarr-configmap
          env:
            - name: DOLI_DB_HOST
              valueFrom:
                secretKeyRef:
                  key: host
                  name: postgres-app
            - name: DOLI_DB_HOST_PORT
              valueFrom:
                secretKeyRef:
                  key: port
                  name: postgres-app
            - name: DOLI_DB_NAME
              valueFrom:
                secretKeyRef:
                  key: dbname
                  name: postgres-app
            - name: DOLI_DB_USER
              valueFrom:
                secretKeyRef:
                  key: user
                  name: postgres-app
            - name: DOLI_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: postgres-app
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: dolibarr-data
              mountPath: "/var/www/documents"
              subPath: documents
            - name: dolibarr-data
              mountPath: "/var/www/html/custom"
              subPath: html_custom
            - name: dolibarr-data
              mountPath: "/var/www/html/conf"
              subPath: config
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            failureThreshold: 3
            periodSeconds: 90
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 60
            periodSeconds: 1
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
