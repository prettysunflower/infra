apiVersion: apps/v1
kind: Deployment
metadata:
  name: nyallo-website
  labels:
    app.kubernetes.io/name: nyallo-website
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nyallo-website
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nyallo-website
    spec:
      containers:
        - name: nyallo-website
          image: git.prettysunflower.moe/nyallo/website:main
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            failureThreshold: 3
            periodSeconds: 90
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 30
            periodSeconds: 1
