apiVersion: apps/v1
kind: Deployment
metadata:
  name: etherpad
  labels:
    app.kubernetes.io/name: etherpad
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: etherpad
  template:
    metadata:
      labels:
        app.kubernetes.io/name: etherpad
    spec:
      containers:
        - name: etherpad
          image: etherpad/etherpad:2.7.2
          ports:
            - containerPort: 9001
              name: http
          envFrom:
            - configMapRef:
                name: etherpad-config
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: postgres-app
                  key: host
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-app
                  key: user
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: postgres-app
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-app
                  key: dbname
          resources:
            limits:
              cpu: 1
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
          securityContext:
            runAsUser: 5001
            runAsGroup: 5001
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            failureThreshold: 3
            periodSeconds: 90
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 30
            periodSeconds: 10
