---
clusterName: sekibanki
talosVersion: v1.13.0-tailscale-1.96.4
kubernetesVersion: v1.36.0
endpoint: https://10.0.0.32:6443
domain: sekibanki.prettysunflower.moe
allowSchedulingOnControlPlanes: true
clusterPodNets:
  - 10.217.0.0/16
clusterSvcNets:
  - 10.218.0.0/16
patches:
  - "@./tailscale.patch.yaml"
  - "@./virtiofs.patch.yaml"
  - |-
    machine:
      network:
        kubespan:
          enabled: true
        nameservers:
          - 100.74.71.91
      features:
        hostDNS:
          forwardKubeDNSToHost: true
      kubelet:
        extraArgs:
          feature-gates: ImageVolume=true
          rotate-server-certificates: true
    cluster:
      apiServer:
        extraArgs:
          feature-gates: ImageVolume=true

nodes:
  - hostname: fulgora
    ipAddress: 10.0.0.32
    controlPlane: true
    installDisk: /dev/sda
    talosImageURL: git.prettysunflower.moe/prettysunflower/talos
  - hostname: gleba
    ipAddress: 10.0.0.30
    controlPlane: true
    installDisk: /dev/sda
    talosImageURL: git.prettysunflower.moe/prettysunflower/talos
  - hostname: vulcanus
    ipAddress: 10.0.0.33
    controlPlane: true
    installDisk: /dev/sda
    talosImageURL: git.prettysunflower.moe/prettysunflower/talos
